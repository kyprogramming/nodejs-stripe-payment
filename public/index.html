<!DOCTYPE html>
<html>

<head>
    <title>Checkout</title>
    <script src="https://js.stripe.com/v3/"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: #fff;
            padding: 30px;
            width: 420px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }

        h2 {
            margin-bottom: 20px;
            text-align: center;
        }

        #payment-element {
            margin-bottom: 20px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #635bff;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        button:hover:not(:disabled) {
            background: #4a45c6;
        }

        button:disabled {
            background: #a09de8;
            cursor: not-allowed;
            opacity: 0.8;
        }

        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.4);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            display: none;
        }

        button.loading .spinner {
            display: inline-block;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        #message {
            margin-top: 10px;
            color: red;
            text-align: center;
        }
    </style>
</head>

<body>

    <div class="container">

        <h2>Pay $10</h2>

        <form id="payment-form">

            <div id="card-element"></div>

            <br>

            <button type="submit" id="pay-btn">
                <span class="spinner" id="spinner"></span>
                <span id="btn-text">Pay Now</span>
            </button>

        </form>

        <p id="message"></p>

    </div>

    <script type="module" src="script.js"></script>

</body>

</html>
